name: Deploy Documentation

on:
  push:
    branches: [ main ]
    paths: [ 'docs-site/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'docs-site/**' ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      
      - name: Build Documentation with Kobweb
        run: |
          cd docs-site
          ../gradlew kobwebExport
          cd ..
      
      - name: Setup Pages
        uses: actions/configure-pages@v6
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './docs-site/.kobweb/site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5